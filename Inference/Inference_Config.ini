[BASEMODEL]
Training_Stratgy    	= "AllCells"
Use_Mask                = true            # whether to use any mask‐fusion at all
Mask_Fusion             = "film"           # one of: "concat", "add", "film"
Use_Text_Mask           = false            # whether to use text‐mask
Text_Prefix_Len         = 16
Text_Prompt             = "film"
Backbone                = "virchow2"       # or virchow2 / resnet18, conch_v1
Unfreeze_last           = 0                # 0 = linear-probe, 2 = last-2 blocks, etc.
Patch_Size              = [256, 256]
Input_Size              = [64, 64]

Input_Type              = "3_Channel"
Activation              = "Identity"
Model                   = "convnet"
Loss_Function           = "CrossEntropyLoss"
Batch_Size              = 64
LoRA                    = true            # whether to use LoRA
full_finetune           = false           # whether to fully finetune the backbone
Precision               = "16-mixed"
Num_of_Worker           = 12
GPU_ID                  = [0]
Max_Epochs              = 30
Random_Seed             = 9374
Classification_Threshold= 0.5   #0.623 for virchow
Image_Type              =".tiff"
WSIReader               ="cuCIM"
Mask_Input         = true
Vis       =  [0]
Batch_Size_Preprocessing= 256
Batch_Size_Masking= 1
Batch_Size_Classification= 512
Prob_Tumour_Tresh= 0.85


[SAM_MODEL]
Model_Type=          'vit_b_histopathology'   # e.g. vit_h_histopathology
tile_shape=          [1024, 1024]
halo=                [64,  64]
batch_size=           1
postprocess=          true
min_mask_region_area= 50
max_mask_region_area= 3600
box_nms_thresh=       0.1                   # PathoSAM default

[CHECKPOINT]
logger_folder           = './lightning_logs/'
model_name              = "Classifier"
Mode                    = "min"
Monitor                 = "val_loss_epoch"
filename                = '{epoch:02d}-{val_loss_epoch:.4f}_{val_f1_epoch:.4f}_Classifier'
save_top_k              = 3

[DATA]
output_path             = "./"
balancing_strategy      = "WeightedRandomSampler"  #same # WeightedRandomSampler , downsample_negatives, oversample_positives , weighted_loss
Downscale_Factor	    = 1
Num_of_Classes          = 2
use_focal_loss          = false
weights                 = [0.5, 0.5]
Dataframe               = '/projects/wispermed_rp18/mitosisDetect/Data/final_dataset/final_dataset.csv'
datasets 		        = ['MIDOG', 'MITOS_WSI_CMC', 'MITOS_WSI_CCMCT','TUPAC16']     #,  #,'MIDOG', 'MITOS_WSI_CMC', 'MITOS_WSI_CCMCT','TUPAC16'  #### 'ICPR2012'
species			        = ['Human', 'Canine']
nrrd_path               = "/projects/wispermed_rp18/mitosisDetect/Data/nrrd/"
masks_path 		        =  "/projects/wispermed_rp18/mitosisDetect/Data/New_masks_pathosam"  # "/projects/wispermed_rp18/mitosisDetect/OMG-Net-test/New_masks_pathosam/"
val_size                = 0.1
Image_Type		        = ".tiff"

[OPTIMIZER]
Algorithm               = 'AdamW'
eps                     = 1e-7
lr                      = 1e-4

[REGULARIZATION]
Label_Smoothing         = 0.03
Stoch_Depth             = 0
Weight_Decay            = 1e-4
Momentum                = 0.9

[SCHEDULER]
Lin_Gamma               = 0.5
Lin_Step_Size           = 5
Type                    = "CosineAnnealingLR"
warmup_epochs           = 2








